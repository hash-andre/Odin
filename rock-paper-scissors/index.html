<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
    <title>Rock Paper Scissors</title>
</head>
<body>
  <header>
    <button id="switch-theme"></button>
  </header>

  <main>
    <h1>Let's play Rock Paper & Scissors.</h1>
    <p>5 rounds</p>
    <button id="start-game">Start game</button>
  </main>

  <section class="info">
    <p id="score"></p>
    <p id="messages"></p>
  </section>

  <section class="buttons">
    <button class="selector" id="rock" value="Rock">Rock</button>
    <button class="selector" id="paper" value="Paper">Paper</button>
    <button class="selector" id ="scissors" value="Scissors">Scissors</button>
  </section>

  <footer>
    <em>Made by Andrea Romano</em>
  </footer>

  <script src="script.js"></script>
</body>
</html>
